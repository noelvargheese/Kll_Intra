<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[KLL Editor]/[KLL संपादक]</title>

<link rel="stylesheet" href="editor.css">

<script src="../config.js"></script>
<script src="editor.js" defer></script>

</head>
<body>

<header class="header">
    <h1>[Editor]/[संपादक]</h1>
</header>

<div class="container">

        <section class="panel">

        <h2>[Add Announcement]/[घोषणा जोड़ें]</h2>

        <input id="[announcementTitle]/[घोषणाशीर्षक]" placeholder="[Title]/[शीर्षक]">

        <textarea
            id="[announcementContent]/[घोषणासामग्री]"
            placeholder="[Content]/[सामग्री]"></textarea>

        <input
            id="[announcementWriter]/[घोषणालेखक]"
            placeholder="[Writer]/[लेखक]">

        <input
            id="[announcementImage]/[घोषणाछवि]"
            placeholder="[Image URL]/[छवि यूआरएल]">

        <input
            id="[announcementPDF]/[घोषणापीडीएफ]"
            placeholder="[PDF URL]/[पीडीएफ यूआरएल]">

        <input
            id="[announcementLink]/[घोषणालिंक]"
            placeholder="[External Link]/[बाहरी लिंक]">

        <button onclick="addAnnouncement()">
            [Add Announcement]/[घोषणा जोड़ें]
        </button>

    </section>

        <section class="panel">

        <h2>[Add Circular]/[परिपत्र जोड़ें]</h2>

        <input id="[circularTitle]/[परिपत्रशीर्षक]" placeholder="[Title]/[शीर्षक]">

        <textarea
            id="[circularContent]/[परिपत्रसामग्री]"
            placeholder="[Content]/[सामग्री]"></textarea>

        <input
            id="[circularWriter]/[परिपत्रलेखक]"
            placeholder="[Writer]/[लेखक]">

        <input
            id="[circularImage]/[परिपत्रछवि]"
            placeholder="[Image URL]/[छवि यूआरएल]">

        <input
            id="[circularPDF]/[परिपत्रपीडीएफ]"
            placeholder="[PDF URL]/[पीडीएफ यूआरएल]">

        <input
            id="[circularLink]/[परिपत्रलिंक]"
            placeholder="[External Link]/[बाहरी लिंक]">

        <button onclick="addCircular()">
            [Add Circular]/[परिपत्र जोड़ें]
        </button>

    </section>

        <section class="panel">

        <h2>[Add Event]/[कार्यक्रम जोड़ें]</h2>

        <input id="[eventTitle]/[कार्यक्रमशीर्षक]" placeholder="[Title]/[शीर्षक]">

        <textarea
            id="[eventContent]/[कार्यक्रमसामग्री]"
            placeholder="[Content]/[सामग्री]"></textarea>

        <input
            id="[eventWriter]/[कार्यक्रमलेखक]"
            placeholder="[Writer]/[लेखक]">

        <input
            id="[eventImage]/[कार्यक्रमछवि]"
            placeholder="[Image URL]/[छवि यूआरएल]">

        <input
            id="[eventPDF]/[कार्यक्रमपीडीएफ]"
            placeholder="[PDF URL]/[पीडीएफ यूआरएल]">

        <input
            id="[eventLink]/[कार्यक्रमलिंक]"
            placeholder="[External Link]/[बाहरी लिंक]">

        <input
            type="date"
            id="[eventDate]/[कार्यक्रमतिथि]">

        <button onclick="addEvent()">
            [Add Event]/[कार्यक्रम जोड़ें]
        </button>

    </section>

        <section class="panel">

        <h2>[Add Left Link]/[बायां लिंक जोड़ें]</h2>

        <input
            id="[leftName]/[बायांनाम]"
            placeholder="[Name]/[नाम]">

        <input
            id="[leftURL]/[बायांयूआरएल]"
            placeholder="[URL]/[यूआरएल]">

        <input
            id="[leftImage]/[बायांछवि]"
            placeholder="[Image URL]/[छवि यूआरएल]">

        <button onclick="addLeftLink()">
            [Add Left Link]/[बायां लिंक जोड़ें]
        </button>

    </section>

        <section class="panel">

        <h2>[Add Right Link]/[दायां लिंक जोड़ें]</h2>

        <input
            id="[rightName]/[दायांनाम]"
            placeholder="[Name]/[नाम]">

        <input
            id="[rightURL]/[दायांयूआरएल]"
            placeholder="[URL]/[यूआरएल]">

        <input
            id="[rightImage]/[दायांछवि]"
            placeholder="[Image URL]/[छवि यूआरएल]">

        <button onclick="addRightLink()">
            [Add Right Link]/[दायां लिंक जोड़ें]
        </button>

    </section>

</div>

<hr>

<div class="records">

    <h2>[Current Records]/[वर्तमान रिकॉर्ड]</h2>

    <div id="[recordsContainer]/[रिकॉर्डकंटेनर]">

        [Loading...]/[लोड हो रहा है...]

    </div>

</div>

</body>
</html>
